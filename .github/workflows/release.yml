name: Release

# Triggered when a `vX.Y.Z` tag lands on main. Builds the XPI,
# runs the test suite as a final regression gate, then publishes
# a GitHub release tagged `v{version}` with the XPI as an asset
# AND updates the rolling `release` tag's `update.json` so
# Zotero's auto-updater offers the new version.
#
# To cut a new release locally:
#   1. `npm run release`     # interactive: bump → tag → push
#   2. (this workflow runs)  # build → test → publish
#
# The bump step is interactive (prompts for major/minor/patch);
# CI's only job is the build-test-publish phase.

on:
  push:
    tags: ["v*"]
  # Manual override — pick a tag from the Actions UI to re-run a
  # publish if the original run failed mid-way.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (e.g. v0.7.0)"
        required: true

permissions:
  contents: write     # create the release + upload assets
  issues: write       # for release-comment notifications
  pull-requests: write

jobs:
  release:
    name: Build, test, publish
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          # Need the full history so the changelog generator can
          # walk back to the previous tag.
          fetch-depth: 0
          # Optional manual-trigger path — check out the tag the
          # user picked from the Actions UI.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (regression gate)
        run: npm run typecheck

      - name: Run tests (regression gate)
        run: npm test

      - name: Build XPI
        run: npm run build

      - name: Publish release
        # Scaffold's release command, when run in CI with a
        # GITHUB_TOKEN, creates the GitHub release tagged with
        # the current `package.json` version, uploads the .xpi
        # from `.scaffold/build/`, and updates the rolling
        # `release` tag's `update.json`.
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tell the scaffold to skip its interactive bump prompt
          # — the tag has already determined the version.
          NODE_ENV: production
          CI: "true"
