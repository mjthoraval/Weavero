name: Test

# Run the Mocha/Chai suite against a real Zotero instance on every
# PR and on every push to main. zotero-plugin-scaffold's tester
# auto-installs xvfb + Zotero on Ubuntu runners (`prepareHeadless`)
# and auto-enables headless mode + `--no-watch` when it detects CI,
# so `npm test` is self-sufficient — no extra setup needed.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  # Manual trigger from the Actions tab — handy when you want to
  # re-run after a flaky failure without pushing an empty commit.
  workflow_dispatch:

# Cancel in-flight runs for the same ref when a new commit lands —
# saves runner minutes on rapid push-push-push iteration.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

# Opt into the Node 24 runtime for actions themselves (not just
# the project's Node toolchain). Silences the deprecation warning
# about actions/checkout@v7 and actions/setup-node@v6 running on
# Node 20, which becomes the forced default on 2026-06-02.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Mocha + Chai (Ubuntu, headless Zotero)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      # `npm ci` honours the lockfile exactly — fails fast if the
      # lockfile and package.json have drifted, which is what we
      # want for reproducible CI runs.
      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        # Hard gate: fails if any new type error appears. The
        # baseline is 0 — bootstrap.js is `// @ts-nocheck`'d (its
        # ~170 errors are DOM-narrowing noise from a 19k-line file
        # never written with types in mind). Anything new — a TS
        # module, a `// @ts-check` JS file, a test spec — gets
        # checked normally.
        run: npm run typecheck

      - name: Run unit tests (Node tier)
        # Pure-logic tests of src/lib/* under plain Node — seconds,
        # no Zotero. Fails fast before the expensive integration tier.
        run: npm run test:unit

      - name: Run tests
        # Scaffold auto-detects CI → headless mode + no-watch +
        # exit-on-finish. Also auto-installs xvfb + Zotero via
        # apt on the Ubuntu runner.
        run: npm test
